services:
  api:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./app:/code/app
    env_file: .env
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    env_file: .env
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U contact -d contact_db"]
      interval: 2s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
